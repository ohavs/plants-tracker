name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Enable Cloud Scheduler API
        run: gcloud services enable cloudscheduler.googleapis.com --project plants-tracker-b9eae

      - name: Install app dependencies
        run: npm ci

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Cloud Functions
        working-directory: functions
        run: npm run build

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyDZH8wtTZZbY1JG-HzKFNaRv_Vtb0qbIn4
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: plants-tracker-b9eae.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: plants-tracker-b9eae
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: plants-tracker-b9eae.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "505041018009"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:505041018009:web:5db2003e39862b5ddeec08
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: BC6KgOr62d3Z-ESwRfz01zAAuC3mRE1q_8XKY8Wmj5UIuNX_44LNXTd9qSiE8aifIOPRb6RhdZgfx30DJu-nQ-0

      - name: Deploy to Firebase (hosting + functions)
        run: npx firebase-tools deploy --only hosting,functions --non-interactive --force

      - name: Remove duplicate manual scheduler job
        run: |
          # Firebase auto-creates its own scheduler job on deploy.
          # Delete the manually-created duplicate to avoid double notifications.
          gcloud scheduler jobs delete sendPlantNotifications-job \
            --project plants-tracker-b9eae \
            --location us-central1 \
            --quiet 2>/dev/null || true
